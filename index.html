<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>주식 자산 앱</title>
  <link rel="manifest" href="manifest.json">
  
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="주식자산">
  <link rel="apple-touch-icon" href="icon.png">
  
  <meta name="theme-color" content="#4f46e5">
  <link rel="stylesheet" href="style.css" />
  
  <!-- 라이브러리 로드 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
</head>

<body>

<header>
  <h1>📊 내 주식 자산</h1>
  <p id="exchange-rate">환율 로딩 중...</p>
</header>

<!-- =========================
     📊 자산 탭
========================= -->
<div id="asset-tab">
  <!-- 입력 영역 -->
  <div class="card">
    <h3>➕ 종목 추가</h3>
    <div class="input-area">
      <input id="symbol" placeholder="종목 (예: NVDA, 005930.KS)" />
      <input id="quantity" type="number" placeholder="수량" />
      <input id="buyPrice" type="number" placeholder="평단가" />
      <button class="btn-primary" onclick="addStock()">추가</button>
    </div>
  </div>

  <div class="card">
    <h3>💰 현금 관리</h3>
    <div class="input-area">
      <input id="cashInput" type="number" placeholder="보유 현금(원)" />
      <button class="btn-secondary" onclick="setCash()">저장</button>
    </div>
  </div>

  <!-- 총 자산 정보 -->
  <div class="total-card">
    <h2 id="total">총 자산: 0원</h2>
    <div id="profit" style="font-size: 1.2rem; font-weight: bold;"></div>
  </div>

  <!-- 종목 리스트 -->
  <div id="stock-list"></div>

  <!-- 그래프 영역 -->
  <div class="card chart-section">
    <h3>📊 종목별 비중</h3>
    <div class="chart-container">
      <canvas id="pieChart"></canvas>
    </div>
    <div class="chart-container" style="margin-top: 20px;">
      <canvas id="barChart"></canvas>
    </div>
  </div>

  <div class="card chart-section">
    <h3>📈 자산 변동 추이</h3>
    <div class="chart-container">
      <canvas id="historyChart"></canvas>
    </div>
    <button class="btn-snap" onclick="saveSnapshot()" style="width:100%; margin-top:15px; padding:12px; background:#4f46e5; color:white; border:none; border-radius:8px; font-weight:bold;">
      📸 현재 자산 상태 기록 (오늘)
    </button>
  </div>

  <!-- 기록 목록 -->
  <div class="card">
    <h3>📅 히스토리 기록</h3>
    <div id="history"></div>
  </div>
</div>

<!-- =========================
     📰 뉴스 탭
========================= -->
<div id="news-tab" style="display:none;">
  <div class="card">
    <h3>🧾 관심 종목 뉴스</h3>
    <div id="news-stock-list"></div>
  </div>
  <div id="news"></div>
</div>

<!-- 하단 관리 버튼 -->
<div style="padding: 10px; display: flex; gap: 10px;">
  <button class="btn-delete" onclick="deleteSelected()" style="flex:1;">🗑 선택 삭제</button>
  <button class="btn-reset" onclick="resetAll()" style="flex:1; background:#999; color:white; border:none; border-radius:8px;">🔥 전체 초기화</button>
</div>

<!-- 🔘 하단 고정 탭바 -->
<div id="tabbar">
  <button id="asset-btn" class="active" onclick="showTab('asset')">📊 자산</button>
  <button id="news-btn" onclick="showTab('news')">📰 뉴스</button>
</div>

<!-- 서비스 워커 및 스크립트 -->
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then((reg) => console.log('SW Registered', reg))
      .catch((err) => console.log('SW Failed', err));
  }

  // 탭 전환 시 버튼 강조 효과를 위한 간단한 함수 보완
  function showTab(tab) {
    document.getElementById("asset-tab").style.display = tab === "asset" ? "block" : "none";
    document.getElementById("news-tab").style.display = tab === "news" ? "block" : "none";
    
    document.getElementById("asset-btn").classList.toggle("active", tab === "asset");
    document.getElementById("news-btn").classList.toggle("active", tab === "news");
  }
</script>

<script src="app.js?v=02"></script>
</body>
</html>
